<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>NAVE. — Registo de Horas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --ocre: #BC5828;
  --verde: #006E54;
  --black: #0F0D0A;
  --cream: #F7F4EF;
  --cream-dark: #EDE9E1;
  --grey: #7F7870;
  --grey-light: #C8C4BC;
  --white: #FFFFFF;
  --error: #C0392B;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Barlow', sans-serif;
  background: var(--cream);
  color: var(--black);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 16px;
}

/* ─── LOGO ─────────────────────────────────────────────── */
.logo {
  font-size: 2rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  color: var(--black);
  margin-bottom: 4px;
}
.logo span { color: var(--ocre); }

.subtitle {
  font-size: 0.75rem;
  font-weight: 300;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 48px;
}

/* ─── CARD ──────────────────────────────────────────────── */
.card {
  background: var(--white);
  border-radius: 16px;
  padding: 40px 32px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 32px rgba(15,13,10,0.08);
}

.card-title {
  font-size: 1.25rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  margin-bottom: 8px;
  text-align: center;
}

.card-hint {
  font-size: 0.875rem;
  font-weight: 300;
  color: var(--grey);
  text-align: center;
  margin-bottom: 32px;
}

/* ─── INPUTS ────────────────────────────────────────────── */
.input-group {
  position: relative;
  margin-bottom: 24px;
}

.input-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 8px;
}

.input-field {
  width: 100%;
  padding: 16px 20px;
  font-family: 'Barlow', sans-serif;
  font-size: 1.25rem;
  font-weight: 400;
  letter-spacing: 0.06em;
  background: var(--cream);
  border: 2px solid var(--cream-dark);
  border-radius: 10px;
  color: var(--black);
  outline: none;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}

.input-field:focus {
  border-color: var(--ocre);
}

#time-input::-webkit-datetime-edit,
#time-input::-webkit-datetime-edit-fields-wrapper {
  text-align: center;
}

.input-field.error {
  border-color: var(--error);
}

/* ─── BUTTONS ───────────────────────────────────────────── */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  width: 100%;
  padding: 18px 24px;
  font-family: 'Barlow', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  -webkit-tap-highlight-color: transparent;
}

.btn:active { transform: scale(0.98); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.btn-primary {
  background: var(--ocre);
  color: var(--white);
}

.btn-primary:hover:not(:disabled) { opacity: 0.88; }

.btn-checkin {
  background: var(--verde);
  color: var(--white);
  font-size: 1.15rem;
  padding: 22px 24px;
  margin-bottom: 12px;
}

.btn-checkin:hover:not(:disabled) { opacity: 0.88; }

.btn-checkout {
  background: var(--error);
  color: var(--white);
  font-size: 1.15rem;
  padding: 22px 24px;
  margin-bottom: 12px;
}

.btn-checkout:hover:not(:disabled) { opacity: 0.88; }

.btn-ghost {
  background: transparent;
  color: var(--grey);
  font-size: 0.8rem;
  padding: 12px;
  margin-top: 8px;
  letter-spacing: 0.08em;
}

.btn-ghost:hover { color: var(--black); }

/* ─── ERROR MESSAGE ─────────────────────────────────────── */
.error-msg {
  background: #fdf0ef;
  border: 1px solid #f5c6c2;
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 0.875rem;
  color: var(--error);
  text-align: center;
  margin-bottom: 20px;
  display: none;
}

.error-msg.visible { display: block; }

/* ─── STAFF INFO ────────────────────────────────────────── */
.staff-greeting {
  text-align: center;
  margin-bottom: 32px;
}

.staff-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--cream-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.75rem;
  font-weight: 700;
  color: var(--ocre);
  margin: 0 auto 16px;
  letter-spacing: 0.02em;
}

.staff-name {
  font-size: 1.5rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.staff-meta {
  font-size: 0.8rem;
  font-weight: 400;
  letter-spacing: 0.03em;
  color: var(--grey);
  margin-bottom: 4px;
}

.staff-status {
  font-size: 0.875rem;
  font-weight: 300;
  color: var(--grey);
}

.open-entry-info {
  background: var(--cream);
  border-radius: 10px;
  padding: 16px 20px;
  margin-bottom: 24px;
  text-align: center;
}

.open-entry-label {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--grey);
  margin-bottom: 6px;
}

.open-entry-time {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--verde);
  letter-spacing: 0.04em;
}

.open-entry-duration {
  font-size: 0.875rem;
  font-weight: 300;
  color: var(--grey);
  margin-top: 2px;
}

/* ─── CONFIRMATION ──────────────────────────────────────── */
.confirm-icon {
  font-size: 3rem;
  text-align: center;
  margin-bottom: 16px;
}

.confirm-title {
  font-size: 1.5rem;
  font-weight: 600;
  text-align: center;
  margin-bottom: 8px;
}

.confirm-detail {
  font-size: 0.875rem;
  font-weight: 300;
  color: var(--grey);
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.6;
}

.confirm-detail strong {
  color: var(--black);
  font-weight: 600;
}

.countdown-bar-wrap {
  background: var(--cream-dark);
  border-radius: 999px;
  height: 4px;
  overflow: hidden;
  margin-bottom: 12px;
}

.countdown-bar {
  height: 100%;
  background: var(--ocre);
  border-radius: 999px;
  width: 100%;
  transition: width 1s linear;
}

.countdown-label {
  font-size: 0.75rem;
  color: var(--grey);
  text-align: center;
  font-weight: 300;
}

/* ─── LOADING ───────────────────────────────────────────── */
.spinner {
  display: inline-block;
  width: 20px;
  height: 20px;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: var(--white);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ─── SCREEN MANAGEMENT ─────────────────────────────────── */
.screen { display: none; }
.screen.active { display: block; }

/* ─── FOOTER ────────────────────────────────────────────── */
.footer {
  margin-top: 32px;
  font-size: 0.7rem;
  font-weight: 300;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--grey-light);
}

/* ─── RESPONSIVE ────────────────────────────────────────── */
@media (max-width: 480px) {
  .card { padding: 32px 24px; }
  body { padding: 16px; justify-content: flex-start; padding-top: 48px; }
}

/* ─── RECENT ENTRIES ─────────────────────────────────────── */
.entry-item { border-bottom:1px solid var(--cream-dark); }
.entry-item:last-child { border-bottom:none; }
.entry-row { display:flex; align-items:center; padding:10px 14px; }
.entry-date { font-size:.75rem; font-weight:600; color:var(--grey);
              white-space:nowrap; width:56px; flex-shrink:0; }
.entry-times { font-size:.875rem; width:130px; flex-shrink:0; }
.entry-duration { font-size:.7rem; font-weight:600; color:var(--verde);
                  background:rgba(0,110,84,.08); padding:3px 8px;
                  border-radius:999px; white-space:nowrap;
                  width:60px; flex-shrink:0; text-align:center; }
.entry-status-row { display:flex; align-items:center; gap:6px;
                    padding:0 14px 8px 76px; }
.entry-status-badge { font-size:.65rem; font-weight:600; letter-spacing:.06em;
                      text-transform:uppercase; color:var(--grey);
                      background:var(--cream-dark); padding:2px 7px;
                      border-radius:999px; white-space:nowrap;
                      flex-shrink:0; }
.entry-status-date { font-size:.68rem; color:var(--grey-light); }
.entries-empty { padding:18px 14px; text-align:center; font-size:.8rem;
                 font-weight:300; color:var(--grey); }
</style>
</head>
<body>

<div class="logo">NAVE<span>.</span></div>
<div class="subtitle">Registo de Horas</div>

<div class="card">

  <!-- ── SCREEN 1: Phone entry ──────────────────────────── -->
  <div id="screen-phone" class="screen active">
    <div class="card-title">Identificação</div>
    <div class="card-hint">Introduza o seu número de telemóvel</div>

    <div id="error-phone" class="error-msg"></div>

    <div class="input-group">
      <label class="input-label" for="phone-input">Telemóvel</label>
      <input
        id="phone-input"
        class="input-field"
        type="tel"
        inputmode="numeric"
        placeholder="9XX XXX XXX"
        maxlength="20"
        autocomplete="tel"
        autofocus
      >
    </div>

    <button id="btn-lookup" class="btn btn-primary" onclick="handleLookup()">
      Continuar
    </button>
  </div>

  <!-- ── SCREEN 2: Check in / Check out ────────────────── -->
  <div id="screen-action" class="screen">
    <div class="staff-greeting">
      <div id="staff-avatar" class="staff-avatar"></div>
      <div id="staff-name" class="staff-name"></div>
      <div id="staff-meta" class="staff-meta" style="display:none"></div>
      <div id="staff-status" class="staff-status"></div>
    </div>

    <div id="open-entry-box" class="open-entry-info" style="display:none">
      <div class="open-entry-label">Entrada registada às</div>
      <div id="open-entry-time" class="open-entry-time"></div>
      <div id="open-entry-duration" class="open-entry-duration"></div>
    </div>

    <!-- ── Time Picker ─────────────────────────────────────── -->
    <div id="time-picker-group" style="display:none; margin-bottom:20px; text-align:center">
      <label class="input-label" for="time-input">Hora do registo</label>
      <input id="time-input" class="input-field" type="time" step="60"
             style="font-size:1.5rem;font-weight:600;text-align:center;letter-spacing:.08em;width:160px;display:block;margin:0 auto">
      <div id="time-hint" style="font-size:.75rem;font-weight:300;color:var(--grey);text-align:center;margin-top:6px;min-height:1em"></div>
    </div>

    <!-- ── Recent Entries ──────────────────────────────────── -->
    <div id="recent-entries-section" style="display:none; margin-bottom:20px">
      <div style="font-size:.7rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;
                  color:var(--grey);text-align:center;margin-bottom:10px">Últimas entradas</div>
      <div id="recent-entries-list"
           style="max-height:220px;overflow-y:auto;border:1px solid var(--cream-dark);
                  border-radius:10px;background:var(--cream)"></div>
    </div>

    <div id="error-action" class="error-msg"></div>

    <button id="btn-checkin" class="btn btn-checkin" onclick="handleCheckin()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 10 10" fill="currentColor" style="flex-shrink:0"><polygon points="0,0 10,5 0,10"/></svg>
      Registar Entrada
    </button>

    <button id="btn-checkout" class="btn btn-checkout" onclick="handleCheckout()" style="display:none">
      <svg width="13" height="13" viewBox="0 0 10 10" fill="currentColor" style="flex-shrink:0"><rect x="1" y="1" width="2.5" height="8" rx=".5"/><rect x="6.5" y="1" width="2.5" height="8" rx=".5"/></svg>
      Registar Saída
    </button>

    <button class="btn btn-ghost" onclick="goToPhone()">
      ← Voltar
    </button>
  </div>

  <!-- ── SCREEN 3: Confirmation ─────────────────────────── -->
  <div id="screen-confirm" class="screen">
    <div id="confirm-icon" class="confirm-icon"></div>
    <div id="confirm-title" class="confirm-title"></div>
    <div id="confirm-detail" class="confirm-detail"></div>

    <div class="countdown-bar-wrap">
      <div id="countdown-bar" class="countdown-bar"></div>
    </div>
    <div id="countdown-label" class="countdown-label"></div>
  </div>

</div>

<div class="footer">NAVE &mdash; Time Entries &mdash; v1.1.4</div>

<script>
// ─────────────────────────────────────────────────────────────
//  CONFIGURATION
//  Replace these webhook URLs with your Make.com scenario URLs.
//
//  Expected request/response contracts:
//
//  LOOKUP_WEBHOOK (POST)
//    Request:  { phone: "+351912345678" }   ← full E.164 format
//    Response (found):
//      {
//        found: true,
//        staffId:    "fibery-uuid",
//        name:       "João Silva",
//        email:      "joao@navepadel.pt",       ← optional
//        nif:        "123456789",               ← optional
//        openEntry:  null
//           — or —
//        openEntry:  { id: "fibery-uuid", checkInTime: "2026-02-27T09:00:00Z" }
//      recentEntries: [
//        {
//          checkIn:    "2026-02-27T09:00:00Z",  ← ISO timestamp
//          checkOut:   "2026-02-27T17:30:00Z",  ← ISO timestamp or null
//          status:     "Aprovado",               ← optional: status label from Fibery
//          statusDate: "2026-02-28T00:00:00Z",  ← optional: date associated with status
//        }, ...
//      ]
//      }
//    Response (not found):
//      { found: false }
//
//  CHECKIN_WEBHOOK (POST)
//    Request:
//      { staffId: "...", staffName: "...", nif: "...",
//        phone: "...", email: "...", timestamp: "2026-02-27T09:00:00Z" }
//    Response: { success: true, entryId: "..." }
//
//  CHECKOUT_WEBHOOK (POST)
//    Request:
//      { entryId: "...", staffId: "...", staffName: "...", nif: "...",
//        phone: "...", email: "...", timestamp: "2026-02-27T18:00:00Z" }
//    Response: { success: true, duration: "8h 30m" }   ← duration optional
// ─────────────────────────────────────────────────────────────
const CONFIG = {
  lookupWebhook:   'https://hook.eu2.make.com/fgkr6f4k6lrvs9t7myyd0ijc0c4udf5f',
  checkinWebhook:  'https://hook.eu2.make.com/bbr5r1njof3hkljnocsjkirb1aohsrq4',
  checkoutWebhook: 'https://hook.eu2.make.com/ymqd52dw926iymjx0sg4bwbmbv1yr8mw',
  resetDelay:      6,   // seconds before auto-reset after confirmation
};

// ─── STATE ────────────────────────────────────────────────────
let state = {
  phone:         '',
  staffId:       '',
  staffName:     '',
  nif:           '',
  email:         '',
  openEntry:     null,   // { id, checkInTime } or null
  recentEntries: [],     // last N entries from lookup webhook
  selectedTime:  null,   // Date chosen in time picker
};

// ─── SCREEN HELPERS ───────────────────────────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showError(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg;
  el.classList.add('visible');
}

function clearError(elId) {
  const el = document.getElementById(elId);
  el.textContent = '';
  el.classList.remove('visible');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  if (loading) {
    btn.disabled = true;
    btn.dataset.originalText = btn.innerHTML;
    btn.innerHTML = '<span class="spinner"></span>';
  } else {
    btn.disabled = false;
    btn.innerHTML = btn.dataset.originalText || btn.innerHTML;
  }
}

// ─── PHONE FORMATTING ─────────────────────────────────────────
function normalisePhone(raw) {
  // Strip everything except digits and leading +
  let digits = raw.replace(/\D/g, '');
  // Normalise country code variants → bare 9-digit local number
  if (digits.startsWith('00351')) digits = digits.slice(5);
  else if (digits.startsWith('351') && digits.length === 12) digits = digits.slice(3);
  // Return full E.164 format so Make.com / Fibery can use it directly
  return '+351' + digits;
}

function initPhoneInput() {
  const input = document.getElementById('phone-input');
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLookup();
  });
  input.addEventListener('input', () => {
    input.classList.remove('error');
    clearError('error-phone');
  });
}

// ─── SCREEN 1: LOOKUP ─────────────────────────────────────────
async function handleLookup() {
  const raw = document.getElementById('phone-input').value.trim();
  if (!raw) return;

  const phone = normalisePhone(raw);
  if (phone.length < 13) {  // +351 (4) + 9 digits = 13 chars minimum
    document.getElementById('phone-input').classList.add('error');
    showError('error-phone', 'Número inválido. Verifique e tente novamente.');
    return;
  }

  clearError('error-phone');
  setLoading('btn-lookup', true);

  try {
    const res = await fetch(CONFIG.lookupWebhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone }),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    console.log('[NAVE debug] lookup response:', JSON.stringify(data));

    if (!data.found) {
      document.getElementById('phone-input').classList.add('error');
      showError('error-phone', 'Número não encontrado. Contacte a administração.');
      setLoading('btn-lookup', false);
      return;
    }

    state.phone     = phone;
    state.staffId   = data.staffId;
    state.staffName = data.name;
    state.nif       = data.nif   || '';
    state.email     = data.email || '';
    state.openEntry     = (data.openEntry && data.openEntry.exists) ? data.openEntry : null;
    state.recentEntries = Array.isArray(data.recentEntries) ? data.recentEntries : [];

    renderActionScreen();
    showScreen('screen-action');

  } catch (err) {
    showError('error-phone', 'Erro de ligação. Verifique a rede e tente novamente.');
    console.error('Lookup error:', err);
  } finally {
    setLoading('btn-lookup', false);
  }
}

// ─── RECENT ENTRIES ───────────────────────────────────────────
function renderRecentEntries() {
  const section = document.getElementById('recent-entries-section');
  const list    = document.getElementById('recent-entries-list');
  const entries = state.recentEntries;

  section.style.display = 'block';

  if (!entries || entries.length === 0) {
    list.innerHTML = '<div class="entries-empty">Sem registos anteriores</div>';
    return;
  }

  list.innerHTML = entries.map(e => {
    const checkInDate = new Date(e.checkIn);
    const dateLabel   = checkInDate.toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' });
    const checkInTime = checkInDate.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

    const cout = e.checkOut
      ? '<span style="color:var(--grey)"> \u2192 </span>' +
        new Date(e.checkOut).toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' })
      : '';

    let badge = '';
    if (e.checkOut) {
      const mins = Math.floor((new Date(e.checkOut) - checkInDate) / 60000);
      const h = Math.floor(mins / 60), m = mins % 60;
      const dur = h > 0 ? h + 'h' + (m > 0 ? ' ' + m + 'min' : '') : (m > 0 ? m + 'min' : '< 1min');
      badge = '<span class="entry-duration">' + dur + '</span>';
    } else {
      badge = '<span class="entry-duration" style="color:var(--grey);background:var(--cream-dark);font-style:italic">aberto</span>';
    }

    const statusLabel = e.status || (e.state && e.state.name) || '';
    let statusBadge = '';
    if (statusLabel) {
      const statusDateLabel = e.statusDate
        ? new Date(e.statusDate).toLocaleDateString('pt-PT', { day: '2-digit', month: 'short' })
        : '';
      statusBadge = '<span class="entry-status-badge">' + statusLabel + '</span>' +
        (statusDateLabel ? '<span class="entry-status-date">' + statusDateLabel + '</span>' : '');
    }

    return '<div class="entry-item">' +
      '<div class="entry-row">' +
      '<span class="entry-date">' + dateLabel + '</span>' +
      '<span class="entry-times">' + checkInTime + cout + '</span>' +
      badge +
      statusBadge +
      '</div>' +
      '</div>';
  }).join('');
}

// ─── TIME PICKER ──────────────────────────────────────────────
function initTimePicker() {
  const group = document.getElementById('time-picker-group');
  const hint  = document.getElementById('time-hint');

  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const toHHMM = d => pad(d.getHours()) + ':' + pad(d.getMinutes());

  group.style.display = 'block';

  // Replace input node to wipe any prior event listeners
  const oldInput = document.getElementById('time-input');
  const fresh = oldInput.cloneNode(true);
  oldInput.parentNode.replaceChild(fresh, oldInput);

  fresh.value = toHHMM(now);
  fresh.max   = toHHMM(now);
  hint.textContent = '';
  state.selectedTime = now;

  fresh.addEventListener('change', () => {
    const parts = fresh.value.split(':').map(Number);
    const h = parts[0], m = parts[1];
    const cur = new Date();
    const sel = new Date(); sel.setHours(h, m, 0, 0);

    if (sel > cur) {
      fresh.value = toHHMM(cur);
      sel.setHours(cur.getHours(), cur.getMinutes(), 0, 0);
      hint.textContent = 'Não pode selecionar uma hora futura.';
    } else {
      const diffMins = Math.floor((cur - sel) / 60000);
      const h2 = Math.floor(diffMins / 60), m2 = diffMins % 60;
      hint.textContent = diffMins === 0 ? '' :
        'Registo retroativo: ' + (h2 > 0 ? h2 + 'h ' + m2 + 'min atrás' : diffMins + 'min atrás');
    }
    fresh.max = toHHMM(new Date());
    state.selectedTime = sel;
  });
}

// ─── SCREEN 2: ACTION ─────────────────────────────────────────
function renderActionScreen() {
  clearError('error-action');

  // Avatar initials
  const initials = state.staffName
    .split(' ')
    .filter(Boolean)
    .slice(0, 2)
    .map(w => w[0].toUpperCase())
    .join('');
  document.getElementById('staff-avatar').textContent = initials;
  document.getElementById('staff-name').textContent = state.staffName;

  const metaParts = [state.phone];
  if (state.email) metaParts.push(state.email);
  if (state.nif)   metaParts.push(state.nif);
  const metaEl = document.getElementById('staff-meta');
  metaEl.textContent = metaParts.join(' · ');
  metaEl.style.display = 'block';

  const checkinBtn  = document.getElementById('btn-checkin');
  const checkoutBtn = document.getElementById('btn-checkout');
  const entryBox    = document.getElementById('open-entry-box');

  if (state.openEntry) {
    // Staff already checked in → show check-out
    const checkInDate = new Date(state.openEntry.checkInTime);
    const timeStr = checkInDate.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });

    document.getElementById('staff-status').textContent = 'Entrada registada hoje';
    document.getElementById('open-entry-time').textContent = timeStr;
    document.getElementById('open-entry-duration').textContent = formatDuration(checkInDate, new Date());

    entryBox.style.display = 'block';
    checkinBtn.style.display  = 'none';
    checkoutBtn.style.display = 'flex';

    // Update duration live every minute
    clearInterval(window._durationTimer);
    window._durationTimer = setInterval(() => {
      document.getElementById('open-entry-duration').textContent =
        formatDuration(checkInDate, new Date());
    }, 60000);
  } else {
    entryBox.style.display    = 'none';
    checkoutBtn.style.display = 'none';

    const hasUnclosed = (state.recentEntries || []).some(e => !e.checkOut);
    if (hasUnclosed) {
      document.getElementById('staff-status').textContent = 'Saída pendente';
      checkinBtn.style.display = 'none';
      showError('error-action',
        'Tem registos anteriores sem saída registada. Regularize junto da administração antes de registar nova entrada.');
    } else {
      document.getElementById('staff-status').textContent = 'Pronto para registar entrada';
      checkinBtn.style.display = 'flex';
      clearError('error-action');
    }
  }

  initTimePicker();
  renderRecentEntries();
}

function formatDuration(start, end) {
  const mins = Math.floor((end - start) / 60000);
  if (mins < 60) return mins + ' min em serviço';
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return h + 'h ' + (m > 0 ? m + 'min ' : '') + 'em serviço';
}

// ─── CHECK IN ─────────────────────────────────────────────────
async function handleCheckin() {
  clearError('error-action');
  setLoading('btn-checkin', true);

  const now = state.selectedTime || new Date();

  try {
    const res = await fetch(CONFIG.checkinWebhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        staffId:   state.staffId,
        staffName: state.staffName,
        nif:       state.nif,
        email:     state.email,
        phone:     state.phone,
        timestamp: now.toISOString(),
      }),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.success) throw new Error('Webhook returned failure');

    const timeStr = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    showConfirmation(
      '✅',
      'Entrada registada!',
      `Olá, <strong>${state.staffName}</strong>!<br>Entrada registada às <strong>${timeStr}</strong>.`
    );

  } catch (err) {
    showError('error-action', 'Erro ao registar entrada. Tente novamente.');
    console.error('Check-in error:', err);
  } finally {
    setLoading('btn-checkin', false);
  }
}

// ─── CHECK OUT ────────────────────────────────────────────────
async function handleCheckout() {
  clearError('error-action');
  setLoading('btn-checkout', true);
  clearInterval(window._durationTimer);

  const now = state.selectedTime || new Date();

  try {
    const res = await fetch(CONFIG.checkoutWebhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        entryId:   state.openEntry.id,
        staffId:   state.staffId,
        staffName: state.staffName,
        nif:       state.nif,
        email:     state.email,
        phone:     state.phone,
        timestamp: now.toISOString(),
      }),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data.success) throw new Error('Webhook returned failure');

    const timeStr = now.toLocaleTimeString('pt-PT', { hour: '2-digit', minute: '2-digit' });
    const checkInDate = new Date(state.openEntry.checkInTime);
    const duration = data.duration || formatDuration(checkInDate, now);

    showConfirmation(
      '👋',
      'Saída registada!',
      `Até logo, <strong>${state.staffName}</strong>!<br>Saída às <strong>${timeStr}</strong>.<br><span style="margin-top:4px;display:inline-block">${duration}</span>`
    );

  } catch (err) {
    showError('error-action', 'Erro ao registar saída. Tente novamente.');
    console.error('Check-out error:', err);
  } finally {
    setLoading('btn-checkout', false);
  }
}

// ─── CONFIRMATION + AUTO RESET ────────────────────────────────
function showConfirmation(icon, title, detail) {
  document.getElementById('confirm-icon').textContent = icon;
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-detail').innerHTML = detail;
  showScreen('screen-confirm');

  const total = CONFIG.resetDelay;
  let remaining = total;

  const bar   = document.getElementById('countdown-bar');
  const label = document.getElementById('countdown-label');

  bar.style.transition = 'none';
  bar.style.width = '100%';

  // Trigger reflow then animate
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      bar.style.transition = `width ${total}s linear`;
      bar.style.width = '0%';
    });
  });

  label.textContent = `A voltar ao início em ${remaining}s…`;

  const tick = setInterval(() => {
    remaining--;
    label.textContent = `A voltar ao início em ${remaining}s…`;
    if (remaining <= 0) {
      clearInterval(tick);
      reset();
    }
  }, 1000);
}

// ─── NAVIGATION ───────────────────────────────────────────────
function goToPhone() {
  clearInterval(window._durationTimer);
  reset();
}

function reset() {
  state = { phone: '', staffId: '', staffName: '', nif: '', email: '',
            openEntry: null, recentEntries: [], selectedTime: null };
  const input = document.getElementById('phone-input');
  input.value = '';
  input.classList.remove('error');
  clearError('error-phone');
  clearError('error-action');
  showScreen('screen-phone');
  setTimeout(() => input.focus(), 100);
}

// ─── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  initPhoneInput();
  document.getElementById('phone-input').focus();
});
</script>
