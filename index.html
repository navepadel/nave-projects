<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAVE — Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f5f0;
      --accent: #c8f03d;
      --gray: #1e1e1e;
      --muted: #555;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      padding: 2.5rem 2rem 1.5rem;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.08em;
      color: var(--white);
    }
    .logo span { color: var(--accent); }
    .subtitle {
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    main {
      flex: 1;
      padding: 3rem 2rem;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }
    .section-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    .tools {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: #1a1a1a;
      border: 1px solid #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
    }
    .tool-card {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 1.6rem 1.8rem;
      background: var(--black);
      text-decoration: none;
      color: var(--white);
      transition: background 0.15s ease;
    }
    .tool-card:hover { background: var(--gray); }
    .tool-card:hover .arrow { transform: translateX(4px); color: var(--accent); }
    .tool-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .icon-menus { background: #1a2a0a; }
    .icon-checkin { background: #0a1a2a; }
    .tool-info { flex: 1; }
    .tool-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 0.06em;
      line-height: 1;
      margin-bottom: 0.3rem;
    }
    .tool-desc {
      font-size: 0.78rem;
      font-weight: 300;
      color: var(--muted);
    }
    .arrow {
      font-size: 1.1rem;
      color: #333;
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .badge {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: #1a2a0a;
      color: var(--accent);
      margin-left: 0.5rem;
      vertical-align: middle;
    }
    footer {
      padding: 1.5rem 2rem;
      border-top: 1px solid #1a1a1a;
      text-align: center;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    @media (max-width: 480px) {
      header { padding: 1.8rem 1.2rem 1.2rem; }
      main { padding: 2rem 1.2rem; }
      .tool-card { padding: 1.4rem 1.2rem; gap: 1.2rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">NAVE<span>.</span></div>
    <div class="subtitle"> Tools</div>
  </header>
  <main>
    <div class="section-label">Available tools</div>
    <div class="tools">
      <a class="tool-card" href="menus.html">
        <div class="tool-icon icon-menus">🍽️</div>
        <div class="tool-info">
          <div class="tool-name">Menus</div>
          <div class="tool-desc">Bar & catering menu display</div>
        </div>
        <div class="arrow">→</div>
      </a>
      <a class="tool-card" href="time.html">
        <div class="tool-icon icon-checkin">⏱️</div>
        <div class="tool-info">
          <div class="tool-name">Staff Check-in <span class="badge">New</span></div>
          <div class="tool-desc">Clock in & out · Time entry tracking</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>
  </main>
  <footer>app.navepadel.com</footer>
</body>
</html>
